<!DOCTYPE html>
<html lang="en">

<head>
    <title>Live Preview</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
            border: 1px solid #ccc;
        }

        .preview-box {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #2ecc71;
        }

        span {
            font-weight: bold;
            color: #2ecc71;
        }
    </style>
</head>

<body>

    <label for="user-input">Type something cool:</label><br><br>
    <input type="text" id="user-input" placeholder="Start typing here...">

    <div class="preview-box">
        <p>Live Preview: <span id="preview-text">...</span></p>
    </div>

    <script>
        const inputField = document.querySelector('#user-input');
        const preview = document.querySelector('#preview-text');

        inputField.addEventListener('input', () => {
            preview.textContent = inputField.value.trim() || "...";
        });
    </script>
</body>

</html>
