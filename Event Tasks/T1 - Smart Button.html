<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task 1: Smart Button</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            transition: 0.3s;
        }

        .btn-active {
            background: #3498db;
            color: white;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <button id="smart-btn" class="btn">Click Me!</button>

    <script>
        const btn = document.getElementById('smart-btn');

        btn.addEventListener('click', function () {
            btn.classList.toggle('btn-active');

            if (btn.classList.contains('btn-active')) {
                btn.textContent = "Clicked!";
            } else {
                btn.textContent = "Click Me!";
            }
        });
    </script>
</body>

</html>
