<!DOCTYPE html>
<html lang="en">

<head>
    <title>Color Changer Cards</title>
    <style>
        body {
            display: flex;
            gap: 20px;
            padding: 50px;
            justify-content: center;
            background: #f4f4f4;
            font-family: sans-serif;
        }

        .card {
            width: 150px;
            height: 150px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .active {
            background: #3498db;
            color: white;
            border-color: #2980b9;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>

    <script>
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            });
        });
    </script>

</body>

</html>
