<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart User Directory</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-accent: #4361ee;
            --bg-soft: #fcfdff;
            --dark-text: #2b2d42;
            --header-gradient: radial-gradient(circle at top right, #4361ee, #3a0ca3);
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Inter', sans-serif;
            color: var(--dark-text);
        }

        .featured-header {
            background: var(--header-gradient);
            padding: 50px 0 80px;
            color: white;
        }

        .featured-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .featured-header hr {
            border-top: 3px solid #ffffff;
            opacity: 0.5;
        }

        .carousel-item-container {
            padding: 15px 0 60px;
        }

        .featured-card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .featured-card:hover {
            transform: translateY(-8px);
        }

        .featured-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .featured-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
        }

        .carousel-indicators {
            bottom: 0px;
        }

        .carousel-indicators [data-bs-target] {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: white;
            opacity: 0.5;
            border: none;
            margin: 0 6px;
        }

        .carousel-indicators .active {
            opacity: 1;
            transform: scale(1.2);
        }

        .carousel-control-prev,
        .carousel-control-next {
            width: 5%;
        }

        .directory-section {
            margin-top: 40px;
            padding-bottom: 80px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .directory-section hr {
            border-top: 2px solid #eef0f5;
            opacity: 1;
            margin-bottom: 25px;
            width: 100%;
        }

        .search-container {
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(67, 97, 238, 0.08);
            margin-bottom: 40px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .search-container .form-control {
            border: none;
            box-shadow: none;
        }

        .btn-modern {
            background: white;
            border-radius: 8px;
            padding: 10px 30px;
            font-weight: 500;
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            background: var(--primary-accent);
            ;
            color: white;
        }

        .btn-details {
            background: white;
            border-radius: 8px;
            padding: 5px 10px;
            font-weight: 400;
            color: var(--primary-accent);
            border: 1px solid var(--primary-accent);
            transition: all 0.3s ease;
        }

        .btn-details:hover {
            background: var(--primary-accent);
            color: white;
        }

        .user-card {
            background: white;
            border: 1px solid var(--primary-accent);
            border-radius: 12px;
            padding: 25px;
            height: 100%;
        }

        .user-avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f3f9;
            color: #64748b;
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row i {
            margin-right: 12px;
            color: var(--primary-accent);
        }

        @media (max-width: 767px) {
            .carousel-item-container .col-6 {
                width: 33.333333%;
            }
        }
    </style>
</head>

<body>

    <section class="featured-header">
        <div class="container text-center">
            <h1>Featured Users</h1>
            <hr>
            <div id="userCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#userCarousel" data-bs-slide-to="0" class="active"
                        aria-current="true"></button>
                    <button type="button" data-bs-target="#userCarousel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#userCarousel" data-bs-slide-to="2"></button>
                </div>

                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <div class="carousel-item-container">
                            <div id="carouselData" class="row g-2 g-md-4 justify-content-center">

                                <!-- <div class="col-4 col-md-3">
                                    <div class="featured-card">
                                        <img src="https://i.pravatar.cc/400?u=6" alt="User">
                                        <div class="featured-overlay text-start">
                                            <h6 class="mb-0 fw-bold">Dennis</h6>
                                            <small class="opacity-75">Considine</small>
                                        </div>
                                    </div>
                                </div> -->
                            </div>
                        </div>
                    </div>


                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#userCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#userCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                </button>
            </div>
        </div>
    </section>

    <div class="container directory-section">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <h3 class="section-title">User Directory</h3>
                <hr>
                <div class="search-container d-flex align-items-center">
                    <i class="bi bi-search ms-3 text-muted"></i>
                    <input type="text" class="form-control" placeholder="Search by name or username..."
                        id="searchInput">
                    <button class="btn btn-modern" id="clearButton">Clear</button>
                </div>

                <div id="loadingMessage" class="text-center my-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Loading users...</p>
                </div>

                <div class="row g-4" id="bodyData">
                    <!-- <div class="col-md-6">
                        <div class="user-card">
                            <div class="d-flex align-items-center mb-3">
                                <img src="https://i.pravatar.cc/150?u=1" class="user-avatar" alt="Avatar">
                                <div>
                                    <h5 class="mb-0 fw-bold">Leanne Graham</h5>
                                    <small class="text-muted">@Bret</small>
                                </div>
                            </div>
                            <div class="info-group">
                                <div class="info-row"><i class="bi bi-envelope"></i> Sincere@april.biz</div>
                                <div class="info-row"><i class="bi bi-geo-alt"></i> Gwenborough, UK</div>
                                <div class="info-row"><i class="bi bi-building"></i> Romaguera-Crona</div>
                            </div>
                        </div>
                    </div> -->

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="sessionToast" class="toast align-items-center text-bg-primary border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    New session started
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close">
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">User Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="modalBody">
                    <!-- Dynamic content -->
                </div>

            </div>
        </div>
    </div>


    <script>
        const carousel = document.getElementById("carouselData");
        const bodyCards = document.getElementById("bodyData");
        const searchInput = document.getElementById("searchInput");
        const clearButton = document.getElementById("clearButton");

        const loadingMessage = document.getElementById("loadingMessage");
        loadingMessage.style.display = "block";

        const toastElement = document.getElementById('sessionToast');
        const toast = new bootstrap.Toast(toastElement);

        const modalElement = document.getElementById('userModal');
        const modalInstance = new bootstrap.Modal(modalElement);

        let allUsers = [];

        let searchText = localStorage.getItem("search");
        searchInput.value = searchText;
        if (!searchText) {
            searchText = "";
            searchInput.value = "";
        } else {
            searchInput.value = searchText;
        }


        async function fetchInitialData() {

            const oldData = localStorage.getItem("users");
            const isActive = sessionStorage.getItem("isActive");

            if (!isActive) {
                toast.show();
                sessionStorage.setItem("isActive", "true");
            }

            if (oldData) {
                loadingMessage.style.display = "none";
                allUsers = JSON.parse(oldData);
                carouselData(allUsers);
                bodyData(allUsers);
                return;
            }

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }

                allUsers = await response.json();
                loadingMessage.style.display = "none";
                localStorage.setItem("users", JSON.stringify(allUsers));
                carouselData(allUsers);
                bodyData(allUsers);

            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        function carouselData(usersArray) {

            carousel.innerHTML = '';
            usersArray.slice(0, 3).forEach(user => {

                const parentCard = document.createElement('div');
                parentCard.classList.add('col-4', 'col-md-3');

                const childCard = document.createElement('div');
                childCard.classList.add('featured-card');

                const image = document.createElement('img');
                if (user.id % 2 == 0) {
                    image.src = "https://t3.ftcdn.net/jpg/03/30/78/62/360_F_330786249_i7inRCNEHz2FL88FrHvg55dgVel3gLYF.jpg";
                }
                else {
                    image.src = "https://img.freepik.com/premium-vector/portrait-business-woman_505024-2788.jpg";
                }
                image.alt = user.username;

                const textCard = document.createElement('div');
                textCard.classList.add('featured-overlay', 'text-start');

                const name = document.createElement('h5');
                name.classList.add('mb-1', 'fw-bold');
                name.textContent = user.name;

                const companyName = document.createElement('small');
                companyName.classList.add('opacity-75');
                companyName.textContent = user.company.name;

                textCard.appendChild(name);
                textCard.appendChild(companyName);

                childCard.appendChild(image);
                childCard.appendChild(textCard);

                parentCard.appendChild(childCard);

                carousel.appendChild(parentCard);
            });
        }

        function bodyData(usersArray) {

            if (searchText !== null && searchText !== undefined) {
                searchText = searchText.toLowerCase().trim();
            }

            let filteredArray = usersArray.filter(u => u.name.toLowerCase().includes(searchText) ||
                u.username.toLowerCase().includes(searchText));

            bodyCards.innerHTML = '';

            if (filteredArray.length === 0) {
                const noResult = document.createElement('div');
                noResult.classList.add('text-center', 'text-muted', 'mt-5');
                noResult.textContent = "No users found.";
                bodyCards.appendChild(noResult);
                return;
            }

            filteredArray.forEach(user => {

                const rootCard = document.createElement('div');
                rootCard.classList.add('col-md-6');

                const parentCard = document.createElement('div');
                parentCard.classList.add('user-card');

                const childCard1 = document.createElement('div');
                childCard1.classList.add('d-flex', 'align-items-center', 'mb-3');

                const image = document.createElement('img');
                image.classList.add('user-avatar');
                if (user.id % 2 == 0) {
                    image.src = "https://t3.ftcdn.net/jpg/03/30/78/62/360_F_330786249_i7inRCNEHz2FL88FrHvg55dgVel3gLYF.jpg";
                }
                else {
                    image.src = "https://img.freepik.com/premium-vector/portrait-business-woman_505024-2788.jpg";
                }
                image.alt = user.username;

                const textCard = document.createElement('div');

                const name = document.createElement('h5');
                name.classList.add('mb-0', 'fw-bold');
                name.textContent = user.name;

                const userName = document.createElement('small');
                userName.classList.add('text-muted');
                userName.textContent = "@" + user.username;

                textCard.appendChild(name);
                textCard.appendChild(userName);

                childCard1.appendChild(image);
                childCard1.appendChild(textCard);


                const childCard2 = document.createElement('div');
                childCard2.classList.add('info-group');

                const email = document.createElement('div');
                email.classList.add('info-row');
                email.innerHTML = '<i class="bi bi-envelope"></i> ' + user.email;

                const location = document.createElement('div');
                location.classList.add('info-row');
                location.innerHTML = '<i class="bi bi-geo-alt"></i> ' + user.address.city;

                const companyName = document.createElement('div');
                companyName.classList.add('info-row');
                companyName.innerHTML = '<i class="bi bi-building"></i> ' + user.company.name;

                const viewBtn = document.createElement('button');
                viewBtn.classList.add('btn', 'btn-details', 'btn-sm', 'ms-auto');
                viewBtn.innerHTML = '<i class="bi bi-eye"></i>';
                viewBtn.addEventListener('click', () => {
                    showUserDetails(user);
                });

                childCard2.appendChild(email);
                childCard2.appendChild(location);
                childCard2.appendChild(companyName);

                parentCard.appendChild(childCard1);
                parentCard.appendChild(childCard2);
                childCard1.appendChild(viewBtn);

                rootCard.appendChild(parentCard);

                bodyCards.appendChild(rootCard);
            });

        };



        searchInput.addEventListener('input', function (event) {
            event.preventDefault();

            searchText = searchInput.value;

            localStorage.setItem("search", searchText);

            bodyData(allUsers);

        });

        clearButton.addEventListener('click', function (event) {
            event.preventDefault();

            searchInput.value = "";

            searchText = searchInput.value;

            localStorage.setItem("search", searchText);

            bodyData(allUsers);

        });

        function showUserDetails(user) {
            const modalBody = document.getElementById("modalBody");

            modalBody.innerHTML = "";

            const topDiv = document.createElement("div");
            topDiv.classList.add("text-center", "mb-3");

            const img = document.createElement("img");
            img.classList.add('user-avatar');
            if (user.id % 2 == 0) {
                img.src = "https://t3.ftcdn.net/jpg/03/30/78/62/360_F_330786249_i7inRCNEHz2FL88FrHvg55dgVel3gLYF.jpg";
            }
            else {
                img.src = "https://img.freepik.com/premium-vector/portrait-business-woman_505024-2788.jpg";
            }
            img.classList.add("rounded-circle", "mb-2");
            img.width = 100;
            img.height = 100;

            const name = document.createElement("h5");
            name.classList.add("fw-bold");
            name.textContent = user.name;

            const username = document.createElement("small");
            username.classList.add("text-muted");
            username.textContent = "@" + user.username;

            topDiv.appendChild(img);
            topDiv.appendChild(name);
            topDiv.appendChild(username);

            const hr = document.createElement("hr");

            const email = document.createElement("p");
            email.innerHTML = '<strong>Email:</strong> ' + user.email;

            const phone = document.createElement("p");
            phone.innerHTML = '<strong>Phone:</strong> ' + user.phone;

            const website = document.createElement("p");
            website.innerHTML = '<strong>Website:</strong> ' + user.website;

            const city = document.createElement("p");
            city.innerHTML = '<strong>City:</strong> ' + user.address.city;

            const street = document.createElement("p");
            street.innerHTML = '<strong>Street:</strong> ' + user.address.street;

            const suite = document.createElement("p");
            suite.innerHTML = '<strong>Suite:</strong> ' + user.address.suite;

            const zipcode = document.createElement("p");
            zipcode.innerHTML = '<strong>Zipcode:</strong> ' + user.address.zipcode;

            const company = document.createElement("p");
            company.innerHTML = '<strong>Company:</strong> ' + user.company.name;

            const catchPhrase = document.createElement("p");
            catchPhrase.innerHTML = '<strong>Catch Phrase:</strong> ' + user.company.catchPhrase;


            modalBody.appendChild(topDiv);
            modalBody.appendChild(hr);
            modalBody.appendChild(email);
            modalBody.appendChild(phone);
            modalBody.appendChild(website);
            modalBody.appendChild(city);
            modalBody.appendChild(street);
            modalBody.appendChild(suite);
            modalBody.appendChild(zipcode);
            modalBody.appendChild(company);
            modalBody.appendChild(catchPhrase);

            const modal = new bootstrap.Modal(document.getElementById('userModal'));
            modal.show();
        }

        fetchInitialData();
    </script>
</body>

</html>
